<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Deep blue glow for eyes -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft inner shadow on face -->
    <radialGradient id="faceGrad" cx="50%" cy="42%" r="56%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde8f8"/>
    </radialGradient>
  </defs>

  <!-- ── Background: deep navy rounded square ── -->
  <rect width="128" height="128" rx="22" fill="#0a1628"/>

  <!-- ── Left ear (triangle + inner highlight) ── -->
  <polygon points="24,62 16,14 56,46" fill="white"/>
  <polygon points="26,58 21,22 50,44" fill="#c8d8f0" opacity="0.5"/>

  <!-- ── Right ear ── -->
  <polygon points="104,62 112,14 72,46" fill="white"/>
  <polygon points="102,58 107,22 78,44" fill="#c8d8f0" opacity="0.5"/>

  <!-- ── Face circle ── -->
  <circle cx="64" cy="72" r="38" fill="url(#faceGrad)"/>

  <!-- ── Left eye (cat-eye almond shape) ── -->
  <ellipse cx="49" cy="66" rx="9" ry="7" fill="#0a1628"/>
  <!-- Vertical slit pupil -->
  <ellipse cx="49" cy="66" rx="3.5" ry="7" fill="#071020"/>
  <!-- Eye shine -->
  <circle cx="52" cy="63" r="2.2" fill="white" opacity="0.85"/>

  <!-- ── Right eye ── -->
  <ellipse cx="79" cy="66" rx="9" ry="7" fill="#0a1628"/>
  <ellipse cx="79" cy="66" rx="3.5" ry="7" fill="#071020"/>
  <circle cx="82" cy="63" r="2.2" fill="white" opacity="0.85"/>

  <!-- ── Nose: terminal › cursor ── -->
  <path d="M60,79 L67,83.5 L60,88"
        fill="none" stroke="#0a1628" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Whiskers (styled as log lines) ── -->
  <!-- Left whiskers -->
  <line x1="14" y1="71" x2="44" y2="74" stroke="#0a1628" stroke-width="1.4" stroke-linecap="round" opacity="0.35"/>
  <line x1="14" y1="78" x2="44" y2="78" stroke="#0a1628" stroke-width="1.4" stroke-linecap="round" opacity="0.25"/>
  <line x1="14" y1="85" x2="44" y2="82" stroke="#0a1628" stroke-width="1.4" stroke-linecap="round" opacity="0.15"/>
  <!-- Right whiskers -->
  <line x1="84" y1="74" x2="114" y2="71" stroke="#0a1628" stroke-width="1.4" stroke-linecap="round" opacity="0.35"/>
  <line x1="84" y1="78" x2="114" y2="78" stroke="#0a1628" stroke-width="1.4" stroke-linecap="round" opacity="0.25"/>
  <line x1="84" y1="82" x2="114" y2="85" stroke="#0a1628" stroke-width="1.4" stroke-linecap="round" opacity="0.15"/>

  <!-- ── Blinking cursor bar at chin — the "logi" accent ── -->
  <rect x="52" y="98" width="24" height="4" rx="2" fill="#4fc3f7" opacity="0.9" filter="url(#glow)"/>
</svg>
